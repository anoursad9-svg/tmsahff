<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <title>TMSAHFF STORE | إدارة الطلبات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 md:p-10">

<div class="max-w-5xl mx-auto">
    <header class="glass p-8 rounded-3xl mb-8 text-center border-b-4 border-pink-600">
        <h1 class="text-4xl font-black">TMSAHFF STORE</h1>
        <p class="text-neutral-400">نظام تتبع الطلبات المتطور</p>
    </header>

    <div class="glass p-2 rounded-2xl flex gap-2 mb-8">
        <input type="text" id="userInput" placeholder="أدخل رقم الطلب..." class="flex-1 bg-transparent p-4 outline-none text-white">
        <button onclick="search()" class="bg-pink-600 px-8 rounded-xl font-bold hover:bg-pink-700">بحث</button>
    </div>

    <div id="results" class="space-y-4"></div>

    <footer class="mt-16 text-center border-t border-neutral-800 pt-8 text-neutral-500">
        <p>تواصل معنا:</p>
        <div class="flex justify-center gap-6 mt-4">
            <a href="https://kick.com/tmsahff" class="hover:text-pink-500">KICK: tmsahff</a>
            <a href="https://wa.me/201010247318" class="hover:text-green-500">WhatsApp: 01010247318</a>
            <a href="https://instagram.com/tmsahtv" class="hover:text-purple-500">Insta: tmsahtv</a>
        </div>
    </footer>
</div>

<div id="modal" class="modal">
    <div class="glass p-8 rounded-3xl w-96 border border-pink-500/30">
        <h2 id="modalTitle" class="text-lg font-bold mb-4">تأكيد الإجراء</h2>
        <textarea id="modalReason" class="w-full bg-neutral-900 p-3 rounded-lg border border-neutral-700 mb-4 hidden" placeholder="اكتب السبب أو التعديلات هنا..."></textarea>
        <div class="flex gap-2">
            <button onclick="hideModal()" class="flex-1 py-2 bg-neutral-800 rounded-xl">إلغاء</button>
            <button id="confirmBtn" class="flex-1 py-2 bg-pink-600 rounded-xl font-bold">تأكيد</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
