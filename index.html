<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TMSAHFF STORE | النظام الاحترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #050505; color: #fff; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(15px); border: 1px solid #333; }
    </style>
</head>
<body class="bg-[#050505] min-h-screen p-4">

<div class="max-w-6xl mx-auto">
    <div class="glass p-6 rounded-2xl flex gap-4 mb-8">
        <input id="userInput" class="flex-1 bg-transparent p-3 outline-none text-white text-lg" placeholder="ابحث باسم اليوزر...">
        <button onclick="search()" class="bg-pink-600 px-10 py-3 rounded-xl font-black">بحث</button>
    </div>

    <div class="glass overflow-x-auto rounded-2xl">
        <table class="w-full text-right">
            <tbody id="results"></tbody>
        </table>
    </div>
</div>

<script>
    // ضع رابط الويب هوك المباشر الخاص بك هنا
    const WEBHOOK = "https://discord.com/api/webhooks/1521713795477667860/Ma3vk6FfyfXCCdYBLE_EMg679hFg2w8nJR4DKTKTtbdwZjMgs1H6WoKYQgRLMH4nMKi5";

    async function search() {
        const query = document.getElementById('userInput').value.trim().toLowerCase();
        const res = document.getElementById('results');
        
        try {
            // استخدام ./ للبحث في نفس مجلد ملف الـ HTML
            const response = await fetch('./data.csv?nocache=' + new Date().getTime());
            if (!response.ok) throw new Error("لا يمكن العثور على الملف");
            
            const text = await response.text();
            const rows = text.split(/\r?\n/).slice(1);
            let html = '';

            rows.forEach(row => {
                const cols = row.split(',');
                if (cols.length < 7) return;
                
                const user = cols[0].replace(/"/g, '').trim();
                if (user.toLowerCase().includes(query)) {
                    const article = cols[1];
                    const date = cols[5];
                    const status = cols[6]?.trim();
                    const id = btoa(user + article);

                    html += `
                    <tr class="border-b border-neutral-800">
                        <td class="p-6 text-pink-400 font-bold">${user}</td>
                        <td class="p-6">${article}</td>
                        <td class="p-6 text-neutral-400">${date}</td>
                        <td class="p-6 font-bold ${status === 'Delivered' ? 'text-green-500' : 'text-yellow-500'}">
                            ${status === 'Delivered' ? '✅ تم التوصيل' : '⏳ قيد الشحن'}
                        </td>
                        <td class="p-6">
                            ${status === 'Pending' ? `
                                <button onclick="handleAction('استعجال', '${article}', '${user}', '${id}')" class="bg-blue-900 px-3 py-1 rounded text-xs">استعجال</button>
                                <button onclick="handleAction('إلغاء', '${article}', '${user}', '${id}')" class="bg-red-900 px-3 py-1 rounded text-xs">إلغاء</button>
                            ` : '⭐ تم التقييم'}
                        </td>
                    </tr>`;
                }
            });
            res.innerHTML = html || '<tr><td colspan="5" class="text-center p-10 text-red-500">لا توجد نتائج</td></tr>';
        } catch (e) { alert("خطأ في تحميل ملف البيانات: " + e.message); }
    }

    async function handleAction(type, order, user, id) {
        if (type === 'إلغاء' && !confirm("هل تريد إلغاء الطلب واسترجاع نقاطك؟")) return;

        // التحقق من الوقت (ساعة واحدة)
        const last = localStorage.getItem(id);
        if (last && (Date.now() - last < 3600000)) {
            alert("⚠️ يجب الانتظار ساعة قبل تكرار الإجراء!");
            return;
        }

        const payload = { content: `🔔 طلب ${type} | اليوزر: ${user} | الطلب: ${order}` };
        
        try {
            await fetch(WEBHOOK, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(payload),
                mode: 'no-cors' // حل لمشكلة منع الإرسال
            });
            localStorage.setItem(id, Date.now());
            alert("تم إرسال الطلب للإدارة!");
        } catch (e) { alert("حدث خطأ أثناء الإرسال!"); }
    }
</script>
</body>
</html>
