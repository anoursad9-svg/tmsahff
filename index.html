<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1 class="text-4xl font-black">TMSAHFF STORE</h1>
    <p class="text-neutral-400 mt-2">نظام تتبع الطلبات المتطور</p>
    
    <div class="glass p-6 mt-8 flex flex-col md:flex-row gap-4">
        <input type="text" id="userInput" placeholder="أدخل رقم الطلب..." class="flex-1 bg-transparent p-3 outline-none border-b border-pink-600">
        <button onclick="search()" class="bg-pink-600 px-8 py-3 rounded-xl font-bold hover:bg-pink-700 transition">بحث</button>
    </div>

    <div id="results"></div>

    <div class="mt-20 border-t border-neutral-800 pt-6">
        <p class="text-neutral-500">تواصل معنا:</p>
        <div class="flex justify-center gap-6 mt-2 text-neutral-400">
            <span>Insta: tmsahtv</span>
            <span>WhatsApp: 01010247318</span>
            <span>KICK: tmsahff</span>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="glass p-8 w-80 text-center border-pink-500 border-2">
        <h2 id="modalTitle" class="font-bold mb-6">تأكيد الإجراء</h2>
        <div class="flex gap-2">
            <button onclick="hideModal()" class="flex-1 py-2 bg-neutral-800 rounded-lg">إلغاء</button>
            <button id="confirmBtn" class="flex-1 py-2 bg-pink-600 rounded-lg font-bold">تأكيد</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
