<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TMSAHFF STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.9); border: 1px solid #333; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <div class="glass p-8 rounded-3xl text-center border-b-4 border-pink-600 mb-8">
            <h1 class="text-4xl font-black">TMSAHFF STORE</h1>
        </div>
        
        <div class="glass p-4 rounded-2xl flex gap-2 mb-8">
            <input id="userInput" class="flex-1 bg-transparent p-2 outline-none" placeholder="اكتب اليوزر...">
            <button onclick="search()" class="bg-pink-600 px-8 py-2 rounded-xl font-bold">بحث</button>
        </div>

        <div id="results" class="space-y-4"></div>
    </div>

    <script>
        const WEBHOOK = "https://discord.com/api/webhooks/1521713795477667860/Ma3vk6FfyfXCCdYBLE_EMg679hFg2w8nJR4DKTKTtbdwZjMgs1H6WoKYQgRLMH4nMKi5";

        async function search() {
            const user = document.getElementById("userInput").value.trim().toLowerCase();
            const res = document.getElementById("results");
            res.innerHTML = "جاري البحث...";
            
            try {
                const response = await fetch('data.csv');
                const data = await response.text();
                const rows = data.split('\n');
                let html = `
                    <div class="grid grid-cols-6 gap-4 text-gray-400 font-bold px-4 mb-2 text-sm">
                        <div>الطلب</div><div>السعر</div><div>التاريخ</div><div>الحالة</div><div>الإجراءات</div>
                    </div>`;

                rows.forEach((row, index) => {
                    const cols = row.split(',');
                    if(cols[0] && cols[0].trim().toLowerCase() === user) {
                        const [u, name, price, date, status] = cols;
                        const id = index; // معرف فريد للطلب

                        html += `
                        <div class="glass p-4 rounded-2xl grid grid-cols-5 gap-4 items-center text-center">
                            <div class="font-bold">${name}</div>
                            <div>${price}</div>
                            <div>${date}</div>
                            <div class="${status.includes('تم التوصيل') ? 'text-green-500' : 'text-yellow-500'}">${status}</div>
                            <div class="flex gap-2 justify-center">
                                ${status.includes('قيد الشحن') ? `
                                    <button onclick="handleAction('استعجال', '${name}', ${id})" class="bg-blue-900 px-2 py-1 rounded text-xs">استعجال</button>
                                    <button onclick="handleAction('تعديل', '${name}', ${id})" class="bg-yellow-900 px-2 py-1 rounded text-xs">تعديل</button>
                                    <button onclick="handleAction('إلغاء', '${name}', ${id})" class="bg-red-900 px-2 py-1 rounded text-xs">إلغاء</button>
                                ` : `<button onclick="handleAction('تقييم', '${name}', ${id})" class="bg-purple-900 px-3 py-1 rounded text-xs">⭐ تقييم</button>`}
                            </div>
                        </div>`;
                    }
                });
                res.innerHTML = html;
            } catch(e) { res.innerHTML = "خطأ في تحميل البيانات."; }
        }

        function handleAction(type, orderName, id) {
            const now = Date.now();
            const storageKey = `action_${type}_${id}`;
            const lastTime = localStorage.getItem(`time_${type}_${id}`);

            // قيود الاستعجال (مرة كل ساعة)
            if (type === 'استعجال' && lastTime && (now - lastTime < 3600000)) {
                alert("تم طلب الاستعجال مؤخراً، يرجى الانتظار ساعة.");
                return;
            }
            // قيود التعديل والإلغاء (مرة واحدة فقط)
            if ((type === 'تعديل' || type === 'إلغاء') && localStorage.getItem(storageKey)) {
                alert("لقد قمت بهذا الإجراء مسبقاً لهذا الطلب!");
                return;
            }

            const note = prompt(`أدخل ملاحظاتك لـ ${type}:`);
            if (note !== null) {
                sendDiscord(type, orderName, note);
                localStorage.setItem(storageKey, "done");
                localStorage.setItem(`time_${type}_${id}`, now);
                alert("تم إرسال طلبك للإدارة.");
            }
        }

        function sendDiscord(type, order, note) {
            fetch(WEBHOOK, {method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({embeds: [{
                    title: `🔔 إجراء جديد: ${type}`,
                    color: 16711845,
                    fields: [
                        { name: "العميل", value: document.getElementById("userInput").value, inline: true },
                        { name: "الطلب", value: order, inline: true },
                        { name: "الملاحظة", value: note }
                    ]
                }]})
            });
        }
    </script>
</body>
</html>
