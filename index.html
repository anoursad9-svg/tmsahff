<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.9); border: 1px solid #333; backdrop-filter: blur(10px); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-6">

<div class="max-w-4xl mx-auto">
    <div class="glass p-8 rounded-3xl mb-8 text-center border-b-4 border-pink-600">
        <h1 class="text-4xl font-black">TMSAHFF STORE</h1>
        <p class="text-neutral-500 mt-2">مركز تتبع الطلبات الذكي</p>
    </div>

    <div class="flex gap-2 mb-8">
        <input type="text" id="userInput" placeholder="أدخل اليوزر للبحث..." class="flex-1 bg-neutral-900 p-4 rounded-xl border border-neutral-800 focus:border-pink-500 outline-none">
        <button onclick="search()" class="bg-pink-600 px-8 rounded-xl font-bold hover:bg-pink-700">بحث</button>
    </div>

    <div id="results" class="space-y-4"></div>
</div>

<div id="modal" class="modal">
    <div class="glass p-8 rounded-3xl w-96 text-center border border-pink-500/30">
        <i class="fas fa-question-circle text-4xl text-pink-500 mb-4"></i>
        <h2 id="modalTitle" class="text-xl font-bold mb-4">تأكيد الإجراء</h2>
        <div class="flex gap-2 justify-center">
            <button onclick="hideModal()" class="px-6 py-2 bg-neutral-800 rounded-xl">إلغاء</button>
            <button id="confirmBtn" class="px-6 py-2 bg-pink-600 rounded-xl font-bold">تأكيد</button>
        </div>
    </div>
</div>

<script>
    const WEBHOOK = "https://discord.com/api/webhooks/1521713795477667860/Ma3vk6FfyfXCCdYBLE_EMg679hFg2w8nJR4DKTKTtbdwZjMgs1H6WoKYQgRLMH4nMKi5";

    async function search() {
        const user = document.getElementById('userInput').value.trim().toLowerCase();
        const resDiv = document.getElementById('results');
        
        try {
            const res = await fetch('data.csv');
            const data = await res.text();
            const rows = data.split('\n');
            let html = '';
            
            rows.forEach((row, i) => {
                if(i === 0 || !row.toLowerCase().includes(user)) return;
                
                const isDelivered = row.toLowerCase().includes('delivered');
                const cols = row.split(',');
                
                html += `
                <div class="glass p-5 rounded-2xl flex justify-between items-center hover:border-pink-500/50 transition">
                    <div>
                        <h3 class="font-bold text-lg">${cols[1] || 'طلب'}</h3>
                        <p class="text-xs text-neutral-500">${cols[5] || 'لا يوجد تاريخ'}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold ${isDelivered ? 'text-green-500' : 'text-yellow-500'}">
                            ${isDelivered ? 'تم التوصيل' : 'قيد الشحن'}
                        </span>
                        <button onclick="showModal('${cols[1]}')" class="text-sm bg-neutral-800 px-3 py-1 rounded-lg hover:bg-neutral-700">إجراء</button>
                    </div>
                </div>`;
            });
            resDiv.innerHTML = html || '<p class="text-center text-red-500">لا يوجد بيانات.</p>';
        } catch(e) { console.error(e); }
    }

    function showModal(order) {
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('confirmBtn').onclick = () => {
            fetch(WEBHOOK, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ content: `طلب: ${order}` }) });
            hideModal();
        };
    }
    
    function hideModal() { document.getElementById('modal').style.display = 'none'; }
</script>
</body>
</html>
